<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الكورسات</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      body {
        font-family: "Cairo", sans-serif;
      }
    </style>
  </head>

  <body>
    <header
      class="w-full py-4 flex flex-row justify-around items-center border-[#E5E7EB] border shadow-sm"
    >
      <div class="logo flex flex-row items-center">
        <div
          class="bg-gradient-to-t from-[#4F39F6] to-[#155DFC] w-10 h-10 flex justify-center items-center rounded-lg"
        >
          <img src="/img/logo.png" class="w-6 h-6" />
        </div>
        <h1 class="text-[24px] font-bold pr-2">منصة التعليم الأكاديمي</h1>
      </div>

      <nav class="nav">
        <ul class="flex flex-row">
          <li>
            <a href="home.html" class="pl-4 font-normal text-base">الرئيسية</a>
          </li>
          <li>
            <a
              href="courses.html"
              class="text-[#155DFC] font-normal text-base pl-4"
              >الكورسات</a
            >
          </li>
          <li>
            <a href="about.html" class="font-normal text-base">حول المنصة</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="max-w-[1100px] mx-auto">
        <h1
          class="text-[30px] font-bold text-[#101828] leading-[36px] mt-[38px] pb-2"
        >
          الكورسات الأكاديمية
        </h1>

        <p
          class="text-[16px] leading-[24px] text-[#4A5565] font-normal pb-[32px]"
        >
          استعرض جميع كورسات الهندسة وتكنولوجيا المعلومات
        </p>

        <div
          class="w-full bg-[#FFFFFF] border border-[#E5E7EB] rounded-[16px] shadow-sm pb-[25px]"
        >
          <div class="flex flex-row p-[25px]">
            <img src="img/SVG (15).svg" alt="" class="w-[20px] h-[20px] ml-2" />
            <h3 class="text-[20px] leading-[28px] text-[#101828] font-semibold">
              تصفية الكورسات
            </h3>
          </div>

          <div class="flex flex-row px-[25px]">
            <div class="ml-6">
              <p class="pb-1">المستوى الأكاديمي</p>
              <select
                id="level-filter"
                class="bg-[#F9FAFB] w-[475px] h-[58px] rounded-[14px] border-2 outline-none px-3"
              >
                <option>جميع المستويات</option>
                <option>المستوى الأول</option>
                <option>المستوى الثاني</option>
                <option>المستوى الثالث</option>
                <option>المستوى الرابع</option>
                <option>المستوى الخامس</option>
              </select>
            </div>

            <div>
              <p class="pb-1">الفصل الدراسي</p>
              <select
                id="semester-filter"
                class="bg-[#F9FAFB] w-[475px] h-[58px] rounded-[14px] border-2 border-[#F9FAFB] outline-none px-3"
              >
                <option>جميع الفصول</option>
                <option>الفصل الأول</option>
                <option>الفصل الثاني</option>
              </select>
            </div>
          </div>
        </div>

        <h1 class="text-[16px] text-[#4A5565] leading-[24px] pt-[32px] pb-9">
          عرض <span id="num-of-courses" class="text-[#155DFC]">0</span> كورس
        </h1>

        <div
          id="courses-container"
          class="grid grid-cols-[repeat(3,350px)] gap-6 pb-10"
        ></div>
      </div>
    </main>

    <footer class="w-full h-[89px]">
      <p
        class="text-[16px] leading-6 font-normal text-[#4A5565] text-center pt-8"
      >
        منصة التعليم الأكاديمي - جميع الحقوق محفوظة
      </p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
